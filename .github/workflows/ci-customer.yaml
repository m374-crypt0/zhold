name: CI - Customer

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "customer/**"
  pull_request:
    paths:
      - "customer/**"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run customer unit tests
        run: make customer test
