name: CI - issuer

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "issuer/**"
  pull_request:
    paths:
      - "issuer/**"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install bun
        run: |
          curl -fsSL https://bun.com/install | bash
          echo "$HOME/.bun/bin" >> "$GITHUB_PATH"

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: nightly

      - name: Run issuer unit tests + coverage
        run: make issuer coverage_ci

      - name: Run issuer and blockchain integration tests + coverage
        run: make COVERAGE_CI=true run/integration/tests/between/issuer/and/local blockchain

      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./issuer/coverage/lcov-<unit>.info,./issuer/coverage/lcov-<integration>.info
